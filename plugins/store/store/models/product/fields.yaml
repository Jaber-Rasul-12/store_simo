fields:
    name:
        label: 'store.store::lang.model.product.name'
        span: auto
        type: text
    short_name:
        label: 'store.store::lang.model.product.short_name'
        span: auto
        type: text
    
    slug:
        label: 'store.store::lang.model.product.slug'
        readOnly: true
        span: auto
        preset:
            field: name
            type: slug
    status:
        label: 'store.store::lang.model.product.status'
        span: auto
        type: switch

    merchant:
        label: 'store.store::lang.model.product.merchant'
        span: auto
        type: relation
        select: full_name
        placeholder: 'store.store::lang.plugin.select'
tabs:
    icons:
        'store.store::lang.plugin.general': 'icon-address-book'
        'store.store::lang.plugin.descriptions': 'icon-file-text'
        'store.store::lang.plugin.inventory': 'icon-cubes'
        'store.store::lang.plugin.features': 'icon-star'
        'store.store::lang.plugin.status': 'icon-toggle-on'
        'store.store::lang.plugin.prices': 'icon-money'
        'store.store::lang.plugin.categories': 'icon-folder-open'
        'store.store::lang.plugin.taxes_products': 'icon-percent'
        'store.store::lang.plugin.return_policies': 'icon-refresh'
        'store.store::lang.plugin.promotions': 'icon-percent'
        'store.store::lang.plugin.colors': 'icon-paint-brush'
        'store.store::lang.plugin.sizes': 'icon-expand'

        'store.store::lang.plugin.files': 'icon-file-image-o'
        'store.store::lang.plugin.related': 'icon-file-image-o'

        

    fields:
        # General Tab
        brand:
            label: 'store.store::lang.model.product.brand'
            span: auto
            type: relation
            select: name
            placeholder: 'store.store::lang.plugin.select'
            tab: 'store.store::lang.plugin.general'
        qty:
            label: 'store.store::lang.model.product.qty'
            span: auto
            type: number
            readOnly: true
            tab: 'store.store::lang.plugin.general'

        # Descriptions Tab
        short_description:
            label: 'store.store::lang.model.product.short_description'
            span: auto
            type: text
            tab: 'store.store::lang.plugin.descriptions'
        long_description:
            label: 'store.store::lang.model.product.long_description'
            span: auto
            type: textarea
            tab: 'store.store::lang.plugin.descriptions'
        video_link:
            label: 'store.store::lang.model.product.video_link'
            span: auto
            type: text
            tab: 'store.store::lang.plugin.descriptions'

        # Features Tab
        is_featured:
            label: 'store.store::lang.model.product.is_featured'
            span: auto
            type: switch
            tab: 'store.store::lang.plugin.features'
        new_product:
            label: 'store.store::lang.model.product.new_product'
            span: auto
            type: switch
            tab: 'store.store::lang.plugin.features'
        is_top:
            label: 'store.store::lang.model.product.is_top'
            span: auto
            type: switch
            tab: 'store.store::lang.plugin.features'
        is_best:
            label: 'store.store::lang.model.product.is_best'
            span: auto
            type: switch
            tab: 'store.store::lang.plugin.features'

        # prices Tab
        price:
            label: 'store.store::lang.model.product.prices'
            context: 'create'
            span: auto
            tab: 'store.store::lang.plugin.prices'
            type: number
        prices:
            label: 'store.store::lang.model.product.prices'
            context: ['update', 'preview']
            tab: 'store.store::lang.plugin.prices'
            type: relationmanager
        # Categories Tab    
        subcategory_products:
            label: store.store::lang.model.product.categories
            type: relationmanager
            context: ['update', 'preview']
            tab: 'store.store::lang.plugin.categories'
        # taxes_products Tab    
        taxes_products:
            label: store.store::lang.model.product.taxes_products
            type: relation
            nameFrom: title
            tab: 'store.store::lang.plugin.taxes_products'
        # return_policies Tab    
        return_policies:
            label: store.store::lang.model.product.return_policies
            type: relation
            nameFrom: title
            tab: 'store.store::lang.plugin.return_policies'
        # promotions Tab    
        promotions:
            label: store.store::lang.model.product.promotions
            type: relationmanager
            context: 'update'
            permissions: 'promotions'
            tab: 'store.store::lang.plugin.promotions'

        # colors Tab    
        colors:
            label: store.store::lang.model.product.colors
            type: relation
            nameFrom: name
            tab: 'store.store::lang.plugin.colors'
        # sizes Tab    
        sizes:
            label: store.store::lang.model.product.sizes
            type: relation
            nameFrom: name
            tab: 'store.store::lang.plugin.sizes'
        # Files Tab
        image:
            label: store.store::lang.model.product.general_image
            type: fileupload
            mode: image
            span: auto
            imageHeight: 260
            imageWidth: 260
            tab: 'store.store::lang.plugin.files'
            thumbOptions:
                mode: crop
                offset:
                    - 0
                    - 0
                quality: 90
                sharpen: 0
                interlace: false
                extension: auto
        images:
            label: store.store::lang.model.product.more_images
            type: fileupload
            span: auto
            mode: image
            imageHeight: 260
            imageWidth: 260
            tab: 'store.store::lang.plugin.files'
            thumbOptions:
                mode: crop
                offset:
                    - 0
                    - 0
                quality: 90
                sharpen: 0
                interlace: false
                extension: auto
        related_products:
            label: 'store.store::lang.model.product.related_products'
            span: full
            type: relation
            nameFrom: name
            context: 'update'
            tab: 'store.store::lang.plugin.related'
                