{% if GetAllProducts.hasMorePages %}
<div class="text-center mt-4 mb-5" id="loadMoreContainer">
    <button 
        class="btn btn-primary load-more-btn" 
        id="loadMoreBtn"
        data-request="{{ nameAlgorithm }}"
        data-request-data="page: {{ GetAllProducts.currentPage + 1 }}, slug: '{{ this.param.slug }}'"
        >
        <i class="fas fa-arrow-down me-2"></i>
        {{ 'شاهد المزيد' |_ }}
        <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner"></span>
    </button>
</div>
{% endif %}
