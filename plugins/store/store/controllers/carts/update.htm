<script>
    $(document).ready(function() {
        // Use more specific selectors for Winter CMS form fields
        var $wallet = $('.form-group[data-field-name="wallet_id"]');
        var $type = $('select[name="Cart[type]"]'); 
        
        // Hide wallet field initially
        $wallet.hide();
        
        // Handle type change
        $type.on('change', function() {
            if ($(this).val() == 'wallet') {
                $wallet.slideDown(400);
            } else {
                $wallet.slideUp(400);
            }
        });
        
        // Trigger change on page load to set initial state
        $type.trigger('change');
    });
</script>
