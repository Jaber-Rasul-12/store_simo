<style>


/* ============================================
   تصميم مؤشر تحميل عصري
   ============================================ */

/* ستايل الحاوية */
.image-container {
    position: relative;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    overflow: hidden;
    min-height: 250px;
}

/* مؤشر التحميل الرئيسي */
.image-loader {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.5s ease;
}

/* تصميم الدائرة المتحركة */
.loader-ring {
    position: relative;
    width: 60px;
    height: 60px;
}

.loader-ring div {
    box-sizing: border-box;
    position: absolute;
    width: 100%;
    height: 100%;
    border: 4px solid transparent;
    border-radius: 50%;
    animation: ring-animation 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
}

.loader-ring div:nth-child(1) {
    border-top-color: #ff6b6b;
    animation-delay: -0.45s;
}

.loader-ring div:nth-child(2) {
    border-right-color: #4ecdc4;
    animation-delay: -0.3s;
}

.loader-ring div:nth-child(3) {
    border-bottom-color: #45b7d1;
    animation-delay: -0.15s;
}

.loader-ring div:nth-child(4) {
    border-left-color: #96ceb4;
}

@keyframes ring-animation {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

/* تأثير نبضات */
.loader-pulse {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    animation: pulse 1.5s ease-out infinite;
}

@keyframes pulse {
    0% {
        transform: scale(0.5);
        opacity: 1;
    }
    100% {
        transform: scale(1.5);
        opacity: 0;
    }
}

/* تأثير تحميل متقدم */
.loader-advanced {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.loader-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
}

.loader-text {
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeText 1.5s ease-in-out infinite;
}

.loader-dots {
    display: flex;
    gap: 8px;
}

.loader-dots span {
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite;
}

.loader-dots span:nth-child(1) { animation-delay: -0.32s; }
.loader-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
    0%, 80%, 100% {
        transform: scale(0);
        opacity: 0;
    }
    40% {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@keyframes fadeText {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

/* الصورة بعد التحميل */
.product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.05);
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.product-image.loaded {
    opacity: 1;
    transform: scale(1);
}

/* تأثير hover للصورة */
.image-container:hover .product-image {
    transform: scale(1.05);
    transition: transform 0.4s ease;
}

/* إضافة تأثير شيمر أثناء التحميل */
.image-container.loading::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 200%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent
    );
    animation: shimmer 1.5s infinite;
    z-index: 5;
}

@keyframes shimmer {
    0% {
        transform: translateX(-100%);
    }
    100% {
        transform: translateX(100%);
    }
}

</style>

<script>
// تصميم مؤشر تحميل عصري ومتقدم
document.addEventListener('DOMContentLoaded', function() {
    
    // التحقق من دعم Intersection Observer
    if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const container = img.closest('.image-container');
                    
                    // إضافة تأثير شيمر
                    container.classList.add('loading');
                    
                    // تحميل الصورة
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                    }
                    
                    observer.unobserve(img);
                }
            });
        }, {
            rootMargin: '50px 0px',
            threshold: 0.01
        });
        
        // معالجة جميع الصور
        const productImages = document.querySelectorAll('.product-image');
        
        productImages.forEach(img => {
            const container = img.closest('.image-container');
            if (!container) return;
            
            // إنشاء مؤشر تحميل متقدم
            const loader = document.createElement('div');
            loader.className = 'image-loader';
            loader.innerHTML = `
                <div class="loader-advanced">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">Loading</div>
                    <div class="loader-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            
            container.style.position = 'relative';
            container.appendChild(loader);
            
            // حفظ المسار الأصلي
            if (!img.dataset.src && img.src) {
                img.dataset.src = img.src;
                img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"%3E%3C/svg%3E';
            }
            
            // معالج تحميل الصورة
            const handleLoad = () => {
                img.classList.add('loaded');
                const loaderEl = container.querySelector('.image-loader');
                if (loaderEl) {
                    loaderEl.style.opacity = '0';
                    setTimeout(() => {
                        loaderEl.remove();
                        container.classList.remove('loading');
                    }, 500);
                }
            };
            
            const handleError = () => {
                const loaderEl = container.querySelector('.image-loader');
                if (loaderEl) {
                    loaderEl.innerHTML = `
                        <div class="loader-advanced">
                            <div class="loader-text" style="color: #ff6b6b;">Error!</div>
                            <button onclick="this.parentElement.parentElement.remove(); this.closest('.image-container').querySelector('img').src='{{ 'assets/img/placeholder.jpg' | theme }}'">
                                Retry
                            </button>
                        </div>
                    `;
                }
            };
            
            if (img.complete) {
                handleLoad();
            } else {
                img.addEventListener('load', handleLoad);
                img.addEventListener('error', handleError);
            }
            
            // بدء مراقبة الصورة
            imageObserver.observe(img);
        });
    }
    
    // إضافة lazy loading للصور
    const allImages = document.querySelectorAll('img:not([loading])');
    allImages.forEach(img => {
        if (img.hasAttribute('width') && img.hasAttribute('height')) {
            img.setAttribute('loading', 'lazy');
        }
    });
});

// إعادة تطبيق التأثيرات على المحتوى الجديد (لـ AJAX)
window.reapplyImageLoaders = function() {
    const newImages = document.querySelectorAll('.product-image:not([data-processed])');
    newImages.forEach(img => {
        img.setAttribute('data-processed', 'true');
        const container = img.closest('.image-container');
        if (container && !container.querySelector('.image-loader')) {
            const loader = document.createElement('div');
            loader.className = 'image-loader';
            loader.innerHTML = `
                <div class="loader-advanced">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">Loading</div>
                    <div class="loader-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            container.appendChild(loader);
        }
    });
};

// استماع لأحداث AJAX
$(document).on('ajaxSuccess', function() {
    setTimeout(reapplyImageLoaders, 100);
});
</script>
