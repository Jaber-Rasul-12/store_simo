<script>
document.addEventListener('DOMContentLoaded', function() {
    // تطبيق lazy loading على جميع الصور التي لها width و height
    const images = document.querySelectorAll('img:not([loading])');
    
    images.forEach(img => {
        // التحقق من وجود width و height
        if (img.hasAttribute('width') && img.hasAttribute('height')) {
            img.setAttribute('loading', 'lazy');
        }
        
        // للصور التي ليس لها width/height، أضف كلاس خاص
        if (!img.hasAttribute('width') || !img.hasAttribute('height')) {
            img.classList.add('image-no-dimensions');
        }
    });
    
    // استخدام Intersection Observer لتحميل الصور عند الظهور (اختياري)
    if ('IntersectionObserver' in window) {
        const lazyImages = document.querySelectorAll('img[data-src]');
        
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.classList.add('loaded');
                    imageObserver.unobserve(img);
                }
            });
        });
        
        lazyImages.forEach(img => imageObserver.observe(img));
    }
});
</script>

<style>


/* منع layout shift */
img {
    display: block;
    max-width: 100%;
    height: auto;
}

/* للصور التي ليس لها أبعاد محددة */
img.image-no-dimensions {
    min-height: 200px;
    background: #f0f0f0;
}

/* مؤشر تحميل للصور */
img[loading="lazy"] {
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
}

img[loading="lazy"].loaded,
img:not([loading="lazy"]) {
    opacity: 1;
}

</style>
