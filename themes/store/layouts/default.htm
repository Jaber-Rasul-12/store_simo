<script>
// تحسين lazy loading مع مؤشر تحميل
document.addEventListener('DOMContentLoaded', function() {
    // استهداف جميع الصور
    const productImages = document.querySelectorAll('.product-image');
    
    productImages.forEach(img => {
        // إضافة مؤشر تحميل
        const container = img.closest('.image-container');
        if (container && !container.querySelector('.image-loader')) {
            const loader = document.createElement('div');
            loader.className = 'image-loader';
            loader.innerHTML = '<div class="spinner-border text-primary spinner-border-sm" role="status"><span class="visually-hidden">Loading...</span></div>';
            loader.style.cssText = 'position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;';
            container.style.position = 'relative';
            container.insertBefore(loader, img);
        }
        
        // إخفاء loader عند تحميل الصورة
        if (img.complete) {
            img.classList.add('loaded');
            const loader = img.parentElement.querySelector('.image-loader');
            if (loader) loader.style.display = 'none';
        } else {
            img.addEventListener('load', function() {
                this.classList.add('loaded');
                const loader = this.parentElement.querySelector('.image-loader');
                if (loader) loader.style.display = 'none';
            });
            
            img.addEventListener('error', function() {
                const loader = this.parentElement.querySelector('.image-loader');
                if (loader) loader.style.display = 'none';
                this.src = "{{ 'assets/img/placeholder.jpg' | theme }}";
            });
        }
        
        // إضافة lazy loading
        if (!img.hasAttribute('loading') && img.hasAttribute('width') && img.hasAttribute('height')) {
            img.setAttribute('loading', 'lazy');
        }
    });
});
</script>
