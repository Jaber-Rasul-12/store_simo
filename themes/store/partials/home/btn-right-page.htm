
    <div class="jaber-nav-container">
        <a href="#section1" class="jaber-nav-btn" data-section="1" >
            <span class="jaber-nav-icon"><i class="fas fa-crown"></i></span>
            <span class="jaber-nav-text">الأفضل</span>
        </a>
        <a href="#section2" class="jaber-nav-btn" data-section="2" >
            <span class="jaber-nav-icon"><i class="fas fa-star"></i></span>
            <span class="jaber-nav-text">مميزة</span>
        </a>
        <a href="#section3" class="jaber-nav-btn" data-section="3">
            <span class="jaber-nav-icon"><i class="fas fa-gem"></i></span>
            <span class="jaber-nav-text">جديدة</span>
        </a>
        <a href="#section4" class="jaber-nav-btn" data-section="4">
            <span class="jaber-nav-icon"><i class="fas fa-medal"></i></span>
            <span class="jaber-nav-text">عالية الجودة</span>
        </a>
    </div>
    <script>
        // ===== تفعيل التنقل السلس وإضافة كلاس active للزر النشط =====
        
        // اختيار جميع الأزرار
        const jaberNavButtons = document.querySelectorAll('.jaber-nav-btn');
        
        // اختيار جميع الأقسام (4 أقسام)
        const jaberSections = document.querySelectorAll('.jaber-section');
        
        // إضافة حدث النقر لكل زر للتنقل السلس
        jaberNavButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                const targetSection = document.querySelector(targetId);
                
                if (targetSection) {
                    targetSection.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
        
        // مراقبة التمرير لتحديد الزر النشط
        function updateActiveButton() {
            let currentSectionId = '';
            const scrollPosition = window.scrollY + 150;
            
            jaberSections.forEach(section => {
                const sectionTop = section.offsetTop;
                const sectionBottom = sectionTop + section.offsetHeight;
                
                if (scrollPosition >= sectionTop && scrollPosition < sectionBottom) {
                    currentSectionId = section.getAttribute('id');
                }
            });
            
            // إزالة كلاس active من جميع الأزرار
            jaberNavButtons.forEach(btn => {
                btn.classList.remove('active');
            });
            
            // إضافة كلاس active للزر المناسب
            if (currentSectionId) {
                const activeButton = document.querySelector(`.jaber-nav-btn[href="#${currentSectionId}"]`);
                if (activeButton) {
                    activeButton.classList.add('active');
                }
            }
        }
        
        // استدعاء الدالة عند التمرير وتحميل الصفحة
        window.addEventListener('scroll', updateActiveButton);
        window.addEventListener('load', updateActiveButton);
        
        // تأثير إضافي: تغيير لون الزر النشط بشكل ديناميكي
        const observerOptions = {
            threshold: 0.3
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute('id');
                    const correspondingButton = document.querySelector(`.jaber-nav-btn[href="#${id}"]`);
                    
                    jaberNavButtons.forEach(btn => btn.classList.remove('active'));
                    if (correspondingButton) {
                        correspondingButton.classList.add('active');
                    }
                }
            });
        }, observerOptions);
        
        jaberSections.forEach(section => observer.observe(section));
    </script>
