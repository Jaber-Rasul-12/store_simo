
<div class="contact-professional">
    <div class="container" style="background: none!important;">

        <div class="row">
            <div class="col-lg-7 mb-4 mb-lg-0">
                <div class="contact-form-wrapper" data-aos="fade-left" data-aos-delay="200">
                    <form method="post" data-request="onSendMessage" data-request-flash class="custom-contact-form" data-request-success="$('#id_full_name, #id_email, #id_subject, #id_message').val('');">
                        <div class="form-group-custom">
                            <input type="text" class="form-control-custom" name="full_name" id="id_full_name" 
                                placeholder="{{ 'الاسم الثلاثي' |_ }}"
                                required="required" data-validation-required-message="{{ 'رجاء ادخل اسمك' |_ }}" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="form-group-custom">
                            <input type="email" class="form-control-custom" name="email" id="id_email" 
                                placeholder="{{ 'البريد الإلكتروني' |_ }}"
                                required="required" data-validation-required-message="{{ 'رجاء ادخل البريد الإلكتروني' |_ }}" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="form-group-custom">
                            <input type="text" class="form-control-custom" name="subject" id="id_subject" 
                                placeholder="{{ 'الموضوع' |_ }}"
                                required="required" data-validation-required-message="{{ 'رجاء ادخل الموضوع' |_ }}" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="form-group-custom">
                            <textarea class="form-control-custom" name="message" rows="6" id="id_message" 
                                placeholder="{{ 'الرسالة' |_ }}"
                                required="required"
                                data-validation-required-message="{{ 'رجاء ادخل الرسالة' |_ }}"></textarea>
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="text-center">
                            <button class="btn-submit" type="submit" id="sendMessageButton">
                                <i class="fas fa-paper-plane me-2"></i> {{ 'إرسال الرسالة' |_ }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="col-lg-5">
                <div class="info-cards">
                    <div class="info-card" data-aos="fade-right" data-aos-delay="100">
                        <div class="card-icon">
                            <i class="fas fa-store"></i>
                        </div>
                        <h3>{{ 'متجر 1' |_ }}</h3>
                        <div class="info-detail">
                            <i class="fas fa-map-marker-alt"></i>
                            <p>{{ 'القامشلي , الكورنيش , الشارع العريض' |_ }}</p>
                        </div>
                        <div class="info-detail">
                            <i class="fas fa-envelope"></i>
                            <a href="mailto:info@vecso.shop">info@vecso.shop</a>
                        </div>
                        <div class="info-detail">
                            <i class="fab fa-whatsapp"></i>
                            <a href="https://wa.me/+963983138125">+963 983 138 125</a>

                        </div>
                    </div>
                    
                    <div class="info-card" data-aos="fade-right" data-aos-delay="200">
                        <div class="card-icon">
                            <i class="fas fa-store-alt"></i>
                        </div>
                        <h3>{{ 'متجر 2' |_ }}</h3>
                        <div class="info-detail">
                            <i class="fas fa-map-marker-alt"></i>
                            <p>{{ 'القامشلي , الكورنيش , الشارع العريض' |_ }}</p>
                        </div>
                        <div class="info-detail">
                            <i class="fas fa-envelope"></i>
                            <a href="mailto:info@vecso.shop">info@vecso.shop</a>
                        </div>
                        <div class="info-detail">
                            <i class="fab fa-whatsapp"></i>
                            <a href="https://wa.me/+963983138125">+963 983 138 125</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
